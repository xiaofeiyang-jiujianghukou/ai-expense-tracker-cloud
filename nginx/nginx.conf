worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Docker embedded DNS — avoids startup failure if upstream is down
    resolver 127.0.0.11 valid=10s;

    # www.expense.com — frontend + API gateway
    server {
        listen 80;
        server_name www.expense.com;

        # Frontend (Vite dev server)
        location / {
            set $frontend_upstream frontend:5173;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # API -> Gateway
        location /api/ {
            set $gateway_upstream expense-gateway:8080;
            proxy_pass http://$gateway_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # nacos.expense.com
    server {
        listen 80;
        server_name nacos.expense.com;
        location = / {
            return 302 /nacos/;
        }
        location / {
            set $nacos_upstream nacos:8848;
            proxy_pass http://$nacos_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
