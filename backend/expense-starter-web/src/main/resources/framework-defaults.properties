# ============================================================
# expense-starter-web — defaults for ALL application services
# ============================================================
# Only properties that every service needs belong here.
# DB / MyBatis / Flyway / Redis are covered by their own starters.
# ============================================================

# --- Nacos config import (Spring Cloud 2024.x requirement) ---
spring.cloud.nacos.config.import-check.enabled=false

# --- Feign (global logging for all clients) ---
feign.client.config.default.loggerLevel=full
logging.level.com.xiaofeiyang.expense=DEBUG

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.export.prometheus.enabled=true
