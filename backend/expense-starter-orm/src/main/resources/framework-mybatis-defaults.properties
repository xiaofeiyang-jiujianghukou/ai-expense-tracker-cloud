# ============================================================
# expense-starter-orm — MyBatis-Plus + DataSource + Flyway defaults
# Loaded ONLY when MyBatis-Plus is on classpath
# ============================================================

# DataSource (from env vars, falls back to localhost)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/ai_expense_tracker?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=${EXPENSE_DB_USERNAME:root}
spring.datasource.password=${EXPENSE_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# Flyway (shared DB — allow out-of-order migration across services)
spring.flyway.out-of-order=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
