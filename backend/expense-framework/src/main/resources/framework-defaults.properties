# ============================================================
# expense-framework — defaults for ALL microservices
# ============================================================
# Only properties that every service needs belong here.
# DB / MyBatis / Flyway / Redis are opt-in — each service
# declares the dependency in its POM and gets corresponding
# defaults via @ConditionalOnClass auto-configuration.
# ============================================================

# --- Nacos config import (Spring Cloud 2024.x requirement) ---
spring.cloud.nacos.config.import-check.enabled=false

# --- Flyway (shared DB — allow out-of-order migration across services) ---
spring.flyway.out-of-order=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- Feign (global logging for all clients) ---
feign.client.config.default.loggerLevel=full
logging.level.com.xiaofeiyang.expense=DEBUG

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.export.prometheus.enabled=true
