server:
  port: 8080

spring:
  application:
    name: ai-expense-tracker
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/ai_expense_tracker?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${EXPENSE_DB_USERNAME}
    password: ${EXPENSE_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: YWktZXhwZW5zZS10cmFja2VyLWp3dC1kZWM2MjMyZC0wNjczLTRkYTMtODNlZS1lODgzN2NiNTJkY2Q=
  expiration: 604800000

agentscope:
  model:
    provider: openai
  openai:
    api-key: ${LLM_API_KEY}
    model-name: ${LLM_MODEL:deepseek-v4-pro}
    base-url: ${LLM_BASE_URL:https://api.deepseek.com}
    stream: true
